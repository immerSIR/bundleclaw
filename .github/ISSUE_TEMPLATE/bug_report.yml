name: Bug Report
description: Report a bug in BundleClaw
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Which implementation are you using?
      options:
        - Node CLI (npm/npx)
        - Python CLI (pip/uvx)
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of BundleClaw are you running? (`bundleclaw --version`)
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Command
      description: Which command is affected?
      options:
        - export
        - import
        - verify
        - transfer
        - bootstrap
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `bundleclaw export --source ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error output if available.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
